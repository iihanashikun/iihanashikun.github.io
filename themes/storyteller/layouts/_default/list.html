{{ define "main" }}
<section class="story-list">
  {{ range .Pages.ByDate.Reverse }}
  <article class="story-entry">
    <a href="{{ .RelPermalink }}">
      <h2>{{ .Title }}</h2>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
      {{ with .Params.attractor }}<span class="attractor-tag">{{ . }}</span>{{ end }}
    </a>
  </article>
  {{ end }}
</section>
{{ end }}
